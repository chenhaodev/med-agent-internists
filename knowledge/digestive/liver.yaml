specialty: digestive
specialty_zh: 消化（含肝）
disease: liver
disease_zh: 病毒性肝炎与肝硬化
source: 《西氏内科学精要》（中文版）
entries:
- id: ACUTE_HEPATITIS_DEF
  title: 急性肝炎定义与病因
  source_page: 481
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 急性肝炎是近期发生的肝脏炎症，病程不超过6个月。
  - 常见原因包括病毒（甲、乙、丙、丁、戊型）和药物、酒精等。
  - 部分患者可完全恢复，少数可能进展为肝衰竭。
  pdf_page: 500
- id: VIRAL_HEPATITIS_TYPES
  title: 五种肝炎病毒特点
  source_page: 481
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 甲肝和戊肝通过粪-口传播，乙肝、丙肝、丁肝通过血液、性接触传播。
  - 甲肝和戊肝不转为慢性，乙肝、丙肝、丁肝可转为慢性。
  - 乙肝和丙肝有疫苗或抗病毒治疗，甲肝和戊肝以对症支持为主。
  pdf_page: 500
- id: ACUTE_HEPATITIS_SYMPTOMS
  title: 急性肝炎常见症状
  source_page: 482
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 早期症状包括乏力、食欲差、恶心、呕吐、肌肉酸痛、低热。
  - 部分患者出现黄疸（皮肤、眼睛发黄）、尿色深、大便颜色变浅。
  - 许多患者无症状或仅有轻微不适，容易被忽视。
  pdf_page: 501
- id: ACUTE_HEPATITIS_DIAGNOSIS
  title: 急性肝炎诊断方法
  source_page: 482
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 通过血液检测病毒抗原、抗体或核酸来确诊。
  - 乙肝表面抗原（HBsAg）阳性表示存在感染。
  - 丙肝抗体阳性需进一步查HCV-RNA确认。
  pdf_page: 501
- id: ACUTE_HEPATITIS_COMPLICATIONS
  title: 急性肝炎并发症
  source_page: 483
  evidence_level: 中
  recommendation: 可考虑
  key_points:
  - 少数患者可出现淤胆型肝炎（持续黄疸、瘙痒）。
  - 极少数（<1%）发展为暴发型肝炎（急性肝衰竭），危及生命。
  - 乙肝、丙肝若超过6个月未愈，可能转为慢性肝炎。
  pdf_page: 502
- id: ACUTE_HEPATITIS_MANAGEMENT
  title: 急性肝炎管理原则
  source_page: 484
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 多数急性肝炎可自愈，需充分休息、保证营养、多喝水。
  - 绝对避免饮酒，以免加重肝损伤。
  - 若出现意识模糊、出血倾向，需立即住院治疗。
  pdf_page: 503
- id: HEPATITIS_PREVENTION
  title: 肝炎预防措施
  source_page: 484
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 甲肝和乙肝有疫苗，建议高危人群（如医务人员、慢性肝病患者）接种。
  - 注意个人卫生，接触患者后洗手，处理排泄物和污染物品。
  - 丙肝无疫苗，避免共用针具、剃须刀等，输血已基本安全。
  pdf_page: 503
- id: ALCOHOLIC_LIVER_DISEASE
  title: 酒精性肝病概述
  source_page: 484
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 长期大量饮酒（男性每日40-80克，持续10-15年）可导致肝损伤。
  - 女性对酒精更敏感，饮酒量更少即可致病。
  - 酒精性肝病包括脂肪肝、酒精性肝炎和肝硬化，前两者可逆。
  pdf_page: 503
- id: ALCOHOLIC_HEPATITIS_TREATMENT
  title: 酒精性肝炎治疗要点
  source_page: 485
  evidence_level: 中
  recommendation: 推荐
  key_points:
  - 彻底戒酒是最关键的治疗措施。
  - 保证充足营养，尤其是蛋白质和维生素。
  - 部分重症患者可在医生指导下使用激素，但需排除感染和出血。
  pdf_page: 504
- id: DRUG_INDUCED_LIVER_INJURY
  title: 药物性肝损伤
  source_page: 485
  evidence_level: 中
  recommendation: 推荐
  key_points:
  - 超过1000种药物可能引起肝损伤，抗生素最常见。
  - 症状类似病毒性肝炎：乏力、恶心、黄疸、尿色深。
  - 一旦怀疑，应立即停用可疑药物，多数可恢复。
  pdf_page: 504
- id: WHEN_TO_SEEK_CARE
  title: 何时就医
  source_page: 483
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 出现黄疸（皮肤、眼睛发黄）、尿色深、大便颜色变浅时。
  - 持续乏力、恶心、呕吐、右上腹痛超过1周。
  - 有意识模糊、行为异常、出血倾向（如牙龈出血、皮肤瘀斑）时立即就医。
  pdf_page: 502
- id: DIG_LIVER_DIET
  title: 肝硬化腹水饮食管理
  source_page: 502
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 肝硬化腹水患者应限制饮食钠摄入，同时配合利尿剂治疗以减轻腹水和水肿
  - 限钠饮食是腹水的一线非药物治疗措施，严重腹水时可能需要利尿剂联合大量腹腔穿刺引流
  - 肝功能严重受损时还需注意蛋白质摄入量，避免过度限制导致营养不良
  pdf_page: 521
- id: DIG_LIVER_REHAB
  title: 药物性肝损伤康复要点
  source_page: 485
  evidence_level: 中
  recommendation: 强推荐
  key_points:
  - 轻至中度药物性肝损伤（DILI）在及时停用相关药物后通常能够自行康复
  - 康复期间应避免再次接触可疑肝毒性药物，避免饮酒，定期复查肝功能
  - 部分DILI有特异性解毒剂（如对乙酰氨基酚中毒用N-乙酰半胱氨酸），应由医生决定
  pdf_page: 504
- id: CIRRHOSIS_MELD
  title: 肝硬化预后评估——MELD评分与肝移植指征
  source_page: 502
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - MELD（终末期肝病评分模型）依据胆红素水平、血肌酐、凝血酶原时间（INR）预测肝硬化短期死亡率及评估肝移植优先级；评分范围6～40分，分数越高病情越重、预测死亡率越高。
  - 当患者MELD评分达到15时，具有肝移植指征；接受移植的平均MELD评分为20分；5年生存率70%～80%。
  - 食管静脉曲张破裂出血是严重危及生命的并发症：5%～15%的曲张静脉患者每年破裂出血，出血后6周内死亡率高达7%～15%；近年发生率和死亡率持续下降。
  - 不进行二级预防的患者再出血风险逼近60%，死亡率达33%；标准二级预防为非选择性β受体阻滞剂联合反复内镜下套扎术（EBL）。
  - 肝性脑病、腹水、急性肾损伤（肝肾综合征）是肝硬化失代偿期的主要并发症，使治疗更为复杂；SBP（自发性细菌性腹膜炎）1年死亡率50%～70%，需长期预防性抗生素治疗。
  pdf_page: 521
