specialty: cardiology
specialty_zh: 心血管
disease: cv_diagnostics
disease_zh: 心血管疾病的辅助检查
source: 《西氏内科学精要》（中文版）
entries:
- id: XRAY_CHEST
  title: X线胸片对心脏结构的评估
  source_page: 39
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - X线胸片能观察心脏大小、形状和肺血管情况，帮助判断心脏是否增大。
  - 后前位胸片心影横径大于胸廓一半提示心脏增大，但需排除肺不张等假性增大。
  - 左心房增大征象：左侧心影变直、气管分叉角度增大、双密度征；右心房增大为右心缘凸出。
  - 左心室增大心尖向左下移位，右心室增大需侧位片评估胸骨后间隙。
  - 主动脉迂曲扩张提示严重动脉硬化或高血压；肺动脉高压表现为近端肺动脉扩张。
  - 左心室压力高可致肺静脉淤血、Kerley B线，严重时出现肺泡积液的蝴蝶翼征。
  - 胸片还能发现心包、冠状动脉、瓣膜等部位的异常钙化。
- id: ECG_BASICS
  title: 心电图波群与正常值
  source_page: 40
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 心电图记录心脏电活动，P波代表心房除极，QRS波群代表心室除极，T波代表心室复极。
  - 标准走纸速度25mm/s时，一小格(1mm)为0.04秒，一大格(5mm)为0.20秒；电压10mm=1mV。
  - 心率可用300除以R-R间期的大格数估算。
  - 正常P-R间期0.12~0.20秒，大于0.20秒提示房室传导阻滞。
  - 正常QRS波群宽度小于0.10秒，超过0.12秒提示室内传导延迟。
  - 正常Q-T间期0.35~0.44秒（心率60~100次/分时），需用QTc公式校正。
- id: ECG_AXIS
  title: 心电图导联及电轴判断
  source_page: 41
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 标准12导联包括6个肢体导联（I、II、III、aVR、aVL、aVF）和6个胸导联（V1~V6）。
  - 肢体导联在额面形成六个轴，每轴间隔30°；正常QRS电轴范围为-30°~+90°。
  - 电轴左偏小于-30°；电轴右偏大于90°。
  - 电轴正常时，I导联和aVF导联QRS主波方向向上。
  - 胸导联V1靠近右心室，V5、V6靠近左心室，正常R波从V1到V6逐渐增高。
  - 右胸导联（如V4R）常用于诊断右心室心肌梗死。
- id: ECG_HYPERTROPHY
  title: 心房与心室肥厚的心电图表现
  source_page: 41
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 左心房异常：II导联P波增宽≥0.12秒或V1导联终末负向P波深≥1mm。
  - 右心房异常：肢体导联P波高尖≥2.5mm。
  - 左心室肥厚常用标准：aVL导联R波≥12mm，或V1、V2 S波加V5、V6 R波≥35mm，伴电轴左偏、ST-T改变。
  - 右心室肥厚：V1导联R/S>1，电轴右偏，右胸导联ST段压低、T波倒置。
  - 慢性肺病引起右心压力增加时，心电图可表现右心房扩大、右心室肥厚及电轴右偏。
  - 急性肺栓塞可表现为电轴右偏、右束支阻滞、I、II、III导联S波、V1~V3 T波倒置。
- id: ECG_BUNDLE_BRANCH
  title: 室内传导阻滞的心电图特点
  source_page: 43
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 左前分支阻滞：电轴左偏超过-45°，II、III、aVF呈rS型，I、aVL呈qR型。
  - 左后分支阻滞：电轴右偏≥90°，II、III、aVF呈qR型，I、aVL呈rS型，需排除其他原因。
  - 左束支阻滞（LBBB）：QRS≥0.12秒，I、aVL、V5、V6 R波宽钝，V1、V2深QS波，ST-T与QRS方向相反。
  - 右束支阻滞（RBBB）：QRS≥0.12秒，V1呈RSR'型，V6 S波宽钝，可伴间隔部非梗死性Q波。
  - 分支阻滞可能类似心肌梗死图形，需结合ST-T异常和病理性Q波鉴别。
  - LBBB常提示心肌疾病（如缺血或肥厚）；RBBB可为正常变异，心率增快时也可出现。
- id: ECG_ISCHEMIA
  title: 心肌缺血与梗死的心电图改变
  source_page: 44
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 心肌缺血典型表现为ST段水平或下斜型压低、T波倒置，可为一过性或持续性。
  - 相邻导联ST段抬高提示严重心肌损伤，常为急性心肌梗死的表现，也可见于变异型心绞痛。
  - 病理性Q波（时限≥0.04秒或深度≥同导联R波1/4）是心肌梗死的诊断标志，可定位梗死区域（见表4-3）。
  - 并非所有心梗都出现Q波；数周至数月后梗死区可能重新出现小R波。
  - 非缺血性心脏病（如心肌淀粉样变、结节病、心室预激等）也可出现异常Q波，需结合临床鉴别。
  - 室壁瘤、急性心包炎、早期复极也可引起ST段抬高，但临床意义不同。
- id: ECG_STTWAVE
  title: ST段及T波改变的常见原因
  source_page: 44
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 低钾血症可导致心前导联U波明显及Q-T间期延长。
  - 高钾血症可使T波高尖。
  - 低钙血症延长Q-T间期，高钙血症缩短Q-T间期。
  - 地高辛常引起广泛导联ST段鱼钩样压低。
  - 轻度或非特异的ST-T改变可在许多患者身上出现而无明确病因，需结合临床判断其意义。
- id: HOLTER
  title: 长程动态心电图的用途与方法
  source_page: 44
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 动态心电图（Holter）可连续记录24~48小时的心电图，用于评估心律失常和传导异常的频率与持续时间。
  - 患者可自行按压事件记录钮，将心电图异常与症状关联，便于诊断。
  - 对于偶发症状，可使用事件记录仪佩戴数周，或使用手持式监测仪在症状出现时记录。
  - 可植入皮下记录仪可用于数月才发作一次的事件诊断。
- id: STRESS_TEST
  title: 负荷试验的基本原理与目的
  source_page: 46
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 负荷试验是无创评估冠心病的常用方法，通过运动或药物增加心肌耗氧量。
  - 正常冠状动脉能相应扩张增加血流，狭窄冠脉则无法满足，导致心电图出现缺血性ST段改变。
  - 负荷试验可用于诊断冠心病、评估病情严重程度和治疗效果。
  - 运动过程中需监测心率、血压和心电图，确保安全。
  - 若患者无法运动可行药物负荷（如腺苷、多巴酚丁胺），同样引起心肌缺血反应。
  - 结果解读需结合患者症状、心电图变化及影像学（如超声、核素）以提高准确性。
