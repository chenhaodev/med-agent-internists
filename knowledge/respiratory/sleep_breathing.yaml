specialty: respiratory
specialty_zh: 呼吸系统
disease: sleep_breathing
disease_zh: 睡眠呼吸障碍（阻塞性睡眠呼吸暂停）
source: 《西氏内科学精要》（中文版）
entries:
- id: OSA_EPIDEMIOLOGY
  title: 阻塞性睡眠呼吸暂停（OSA）定义与流行病学
  source_page: 259
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - OSA是睡眠呼吸暂停中最常见类型；中老年男性患病率约6%，女性较低（女性9%、男性24%的睡眠呼吸障碍总患病率）。
  - 定义：呼吸暂停 = 气流完全中止≥10s；呼吸暂停低通气指数（AHI）≥5次/小时为诊断阈值。
  - 主要危险因素：肥胖、上气道解剖异常（巨舌、腭垂过长、扁桃体肥大、小颌畸形）、颈围增大（男>17英寸，女>16英寸）。
  - OSA是系统性高血压最常见的可识别原因（1级证据）；低氧血症也与OSA患者脑卒中、冠心病风险升高相关。
  pdf_page: 280

- id: OSA_DIAGNOSIS
  title: OSA诊断与评估
  source_page: 259
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 主诉：晨起头痛、夜间频繁觉醒、日间嗜睡（包括驾驶时嗜睡）；同睡者报告夜间打鼾或喘息。
  - 金标准：多导睡眠图（PSG）——同步记录睡眠时心电图、脑电图、口鼻气流、血氧饱和度和呼吸运动。
  - OSA确诊标准：睡眠中口鼻气流停止或减低，同时胸腹呼吸运动仍存在（区别于中枢性睡眠呼吸暂停）。
  - 强烈怀疑OSA患者可行家庭睡眠监测（测量气流、血氧饱和度和胸腹肌肉运动），诊断有效（1级证据）。
  - 需排除：甲状腺功能减退、肢端肥大症、淀粉样变可引起或加重OSA。
  pdf_page: 281

- id: OSA_TREATMENT
  title: OSA治疗策略
  source_page: 260
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 持续气道正压通气（CPAP）：防止上气道塌陷，对大多数患者有效（1级证据）；CPAP可使OSA相关心血管并发症得到部分缓解（2～3级证据）。
  - 自动滴定CPAP与固定CPAP设定效果相当（1级证据）。
  - 肥胖者显著减重（通过生活方式改变或减肥手术）可降低AHI（1级证据）；同时避免使用镇静剂和酒精（3级证据）。
  - 外科手术（腺样体扁桃体切除、腭垂软腭咽成形术）适用于特定解剖异常患者；儿童OSA腺扁切除术效果并不优于等待神经心理功能发育完善（1级证据）。
  - 仅在CPAP治疗失败后方考虑手术；严重病例或作为最终手段可行气管切开术。
  pdf_page: 281
