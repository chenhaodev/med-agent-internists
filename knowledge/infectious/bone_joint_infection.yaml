specialty: infectious
specialty_zh: 感染
disease: bone_joint_infection
disease_zh: 骨和关节感染
source: 《西氏内科学精要》（中文版）
entries:
- id: OSTEO_RISK
  title: 骨髓炎危险因素
  source_page: 986
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 糖尿病、高血压、高血脂或吸烟会损害下肢血供，增加骨髓炎风险。
  - 开放性骨折（如车祸、高处坠落）后，骨折处易被污染并导致慢性感染。
  - 长时间卧床或截瘫患者，骨盆、骶骨受压处易发生骨髓炎。
  - 糖尿病患者足部出现溃疡或感染时，应警惕骨髓炎可能。
- id: SEPTARTH_RISK
  title: 化脓性关节炎危险因素
  source_page: 986
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 已有关节疾病（如类风湿关节炎、骨关节炎）者，关节更易感染。
  - 轻微关节损伤后可能引起关节内出血，为细菌繁殖创造条件。
  - 菌血症（血液中有细菌）可播散至关节，引起化脓性关节炎。
  - 人工关节或假体植入后，细菌容易在材料表面形成生物膜导致感染。
- id: DIAG_EXAM
  title: 骨关节感染诊断方法
  source_page: 987
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 磁共振（MRI）是诊断骨髓炎的首选检查，能清晰显示骨髓水肿。
  - 骨扫描或CT可用于肾功能不全、不能做增强MRI的患者。
  - 血培养或骨活检培养可以帮助确定病原菌，指导用药。
  - 关节穿刺抽取关节液检查是化脓性关节炎的确诊方法。
  - C反应蛋白（CRP）和血沉（ESR）升高支持感染诊断。
- id: WHEN_SEEK
  title: 何时就医怀疑骨关节感染
  source_page: 987
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 关节出现红、肿、热、痛且伴随发热，应尽快就医。
  - 不明原因的持续后背、骨盆或髋部疼痛，即使不发烧也要检查。
  - 糖尿病患者足部皮肤溃疡长期不愈合，伴疼痛或分泌物，需排查骨髓炎。
  - 人工关节术后出现异常疼痛、肿胀或发热，需及时就诊。
  - 开放性骨折后数月或数年出现局部疼痛、窦道流脓，可能为慢性骨髓炎。
- id: TREAT_PRINC
  title: 骨关节感染治疗原则
  source_page: 988
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 治疗需手术清创（清除坏死组织）加抗生素联合应用。
  - 死骨或异物（如内固定、假体）必须手术取出才能控制感染。
  - 化脓性关节炎需反复穿刺抽脓或关节镜清创，直至脓液清除。
  - 人工关节感染通常需要移除假体，放置抗生素垫片4-6周后再植入新假体。
- id: MEDICATION_NOTE
  title: 抗生素使用注意事项
  source_page: 988
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 抗生素需根据培养和药敏结果选择，首选β-内酰胺类。
  - 喹诺酮类（如左氧氟沙星）口服效果与静脉相当，但可能引起跟腱断裂或难辨梭菌肠炎。
  - 利福平用于葡萄球菌感染时可提高治愈率，但需注意与其他药物的相互作用。
  - 万古霉素常用于耐药葡萄球菌（MRSA）的经验性治疗。
  - 治疗期间需每周监测肝肾功能、血常规及血药浓度，防止药物毒性。
- id: TREAT_DURATION
  title: 骨关节感染治疗时长
  source_page: 988
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 急性骨髓炎抗生素疗程一般4-6周。
  - 慢性骨髓炎可能需要3个月或更长的治疗，根据临床反应调整。
  - 化脓性关节炎（天然关节）一般治疗4周；人工关节感染通常治疗6周以上。
  - 治疗结束前应复查CRP、ESR降至正常，局部症状体征消失。
- id: LIFE_MANAGE
  title: 生活方式管理预防感染
  source_page: 986
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 严格控制血糖（糖尿病患者）是预防足部骨髓炎的关键。
  - 戒烟、控制血压和血脂可改善下肢血液循环，降低感染风险。
  - 糖尿病患者每日检查足部有无伤口、水疱或红肿，保持足部清洁干燥。
  - 长期卧床患者需定时翻身、使用减压垫，预防压疮和骶骨骨髓炎。
  - 开放性骨折后按医嘱进行康复锻炼，避免过早负重，预防慢性感染。
- id: COMPLICATION
  title: 骨关节感染并发症预防
  source_page: 989
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 正确诊断、充分清创和规范抗生素治疗多数预后良好。
  - 糖尿病患者慢性骨髓炎复发率可高达30%，需长期随访。
  - 人工关节感染后约25-50%可能出现功能丧失，需早期识别。
  - 感染控制不佳可能导致骨折不愈合、假体失效，甚至需要截肢。
  - 警惕感染播散至血液引起脓毒症（表现为高热、寒战、血压下降）。
- id: PATIENT_EDU
  title: 患者及家属日常护理建议
  source_page: 989
  evidence_level: 未注明
  recommendation: 未注明
  key_points:
  - 遵医嘱完成全程抗生素治疗，不要自行停药。
  - 注意观察手术切口或伤口有无红、肿、流脓，及时报告医生。
  - 合理饮食、适度锻炼，增强免疫力，促进骨骼愈合。
  - 监测体温，一旦出现发热或感染部位疼痛加重，立即就医。
  - 人工关节患者避免剧烈运动或高冲击活动，减少脱位和感染风险。
