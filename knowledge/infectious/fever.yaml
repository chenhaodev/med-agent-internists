specialty: infectious
specialty_zh: 感染性疾病
disease: fever
disease_zh: 发热与发热综合征（含不明原因发热）
source: 《西氏内科学精要》（中文版）
entries:
- id: FEVER_DEFINITION_MECHANISM
  title: 发热的定义与发病机制
  source_page: 906
  evidence_level: 高
  recommendation: 参考
  key_points:
  - 发热定义：体温>38.3°C（100.9°F）或超过正常日变化范围（36.8°C±0.4°C）。
  - 机制：单核/巨噬细胞受病原激活→产生IL-1、IL-6、TNF（内源性致热原）→下丘脑调定点升高→体温升高。
  - 前列腺素抑制剂（阿司匹林、对乙酰氨基酚）阻断前列腺素合成→退热；儿童应使用对乙酰氨基酚（水杨酸盐有Reye综合征风险）。
  - 高热（>41°C/105.8°F）可迅速致命，对退热药无反应（如中暑、恶性高热）；与发热机制不同（调定点正常但散热失败）。
  pdf_page: 906

- id: FEVER_EVALUATION
  title: 急性发热诊断评估——重要病原考量
  source_page: 907
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 所有曾去过疟疾流行地区的发热患者均应考虑疟疾（不管距归来时间多久）；周期性寒战+体温升高（间歇1~3天）、两次发作间体温正常，高度提示疟疾。
  - 伤寒/副伤寒：常见于印度、墨西哥、菲律宾、巴基斯坦等国旅行者；隐匿起病，第2周可有玫瑰疹；确诊靠血培养/粪培养。
  - 评估要素：旅行史（路线/活动/地域/季节）、动物/昆虫暴露、职业暴露、性接触史；退热药可改变发热的特点，在评估期间可暂缓使用。
  - 老年患者、糖皮质激素使用者、慢性肝肾病患者可能不出现明显发热。
  pdf_page: 907

- id: FUO
  title: 不明原因发热（FUO）
  source_page: 912
  evidence_level: 中
  recommendation: 参考
  key_points:
  - FUO传统定义：发热>38.3°C、持续>3周、经过1周全面住院检查仍未确诊。
  - 三大病因类别：感染性疾病（最常见）、恶性肿瘤（尤其淋巴瘤）、自身免疫/炎症性疾病（如成人Still病、SLE）。
  - 诊断策略：详细病史+系统体格检查+常规实验室（血培养×3、CBC、CRP/ESR、肝功能）→影像学（CT/PET）→有针对性的侵入性检查（如骨髓活检、淋巴结活检）。
  - 感染病因FUO中，细菌性心内膜炎、腹腔内脓肿和结核是最常见原因。
  pdf_page: 908
