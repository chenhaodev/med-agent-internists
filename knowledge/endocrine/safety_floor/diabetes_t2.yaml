safety_floor_name: 2型糖尿病饮食安全底线
scope: [diabetes_t2]
entries:
  - title: 水果选择与进食时机
    source: 安全底线
    items:
      - 糖尿病患者可以吃水果，但应选择低升糖指数（低GI）水果（如苹果、草莓、柚子），避免西瓜、荔枝、龙眼等高GI水果
      - 每天水果摄入建议控制在150-200克（约一个中等大小苹果），分次食用，不要集中一次吃完
      - 最好在两餐之间（如上午10点或下午3点）吃水果，不要在正餐同时吃，以减少血糖波动
      - 避免果汁和果干——榨汁去除纤维且一次喝入多份水果的糖分；果干水分少、含糖量高，均不适合
