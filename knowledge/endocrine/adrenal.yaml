specialty: endocrine
specialty_zh: 内分泌系统
disease: adrenal
disease_zh: 肾上腺疾病（艾迪生病、库欣综合征、嗜铬细胞瘤）
source: 《西氏内科学精要》（中文版）
entries:
- id: ADDISONS_DISEASE
  title: 艾迪生病（原发性肾上腺皮质功能减退症）
  source_page: 693
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 病因：自身免疫性肾上腺破坏（艾迪生病）是工业化国家最常见原因，占原发性病例约65%；约70%患者存在抗肾上腺抗体；结核现占15%~20%（发展中国家仍重要）。
  - 常见表现：厌食、体重下降、进行性疲劳、体位性头晕、腹痛；色素沉着（伸侧皮肤、掌纹、颊黏膜）是原发性肾上腺皮质功能减退的特征性体征。
  - 实验室：低钠血症、高钾血症、轻度代谢性酸中毒、低血糖；血浆ACTH>20pg/ml+立位PRA>3ng/（ml·h）+醛固酮降低=原发性。
  - 肾上腺危象（急症）：应立即抽血测皮质醇和ACTH后立刻静脉注射氢化可的松100mg+生理盐水，不等待实验室结果。
  - 长期替代治疗：氢化可的松15~20mg清晨 + 5mg下午3时（模拟生理节律）；氟氢可的松100µg/d盐皮质激素替代；应激时氢化可的松剂量加倍；严重应激（全麻/大手术）需150~300mg/d静脉注射。
  pdf_page: 693

- id: CUSHING_SYNDROME
  title: 库欣综合征（皮质醇过多综合征）
  source_page: 698
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - ACTH依赖性（85%）：垂体ACTH瘤（库欣病，占ACTH依赖性90%）+异位ACTH（小细胞肺癌最常见）。非ACTH依赖性（15%）：肾上腺腺瘤/腺癌。
  - 特征性体征：向心性肥胖+四肢消瘦、满月脸（75%）、水牛背（颈背部脂肪垫，95%）、紫纹（宽>1cm，65%）、近端肌无力（60%）。
  - 筛查试验：24小时尿游离皮质醇（UFC，敏感性90%，UFC>50µg/24h高度提示）+过夜1mg地塞米松抑制试验（晨8时皮质醇>1.8µg/dl提示阳性）+夜间唾液皮质醇（高敏感性和特异性）。
  - 手术是库欣综合征的首选治疗：垂体库欣病→经蝶手术；肾上腺腺瘤→单侧肾上腺切除；肾上腺癌→预后差，仅20%存活>1年。
  pdf_page: 698

- id: PRIMARY_ALDOSTERONISM
  title: 原发性醛固酮增多症
  source_page: 699
  evidence_level: 中
  recommendation: 参考
  key_points:
  - 病因：醛固酮分泌瘤（Conn综合征）最常见，约占60%；双侧肾上腺增生约占40%。
  - 临床表现：难治性高血压+低血钾（或自发性低血钾）；通常年龄<40岁；高血压合并低血钾应考虑此诊断。
  - 筛查：早晨立位醛固酮/肾素比值（ARR）>30（醛固酮单位ng/dl，PRA单位ng/ml/h）为阳性；确认试验：口服盐负荷后醛固酮仍高。
  - 治疗：腺瘤→腹腔镜肾上腺切除；双侧增生→螺内酯（盐皮质激素拮抗剂）长期治疗。
  pdf_page: 699
