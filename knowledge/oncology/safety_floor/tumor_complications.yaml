safety_floor_name: 化疗相关恶心呕吐居家照护安全底线
scope: [tumor_complications]
entries:
  - title: 化疗期间恶心呕吐的居家管理
    source: 安全底线
    items:
      - 少量多餐，每2-3小时进食少量清淡易消化食物，避免空腹或过饱
      - 进食前后30分钟避免剧烈活动，进食后保持坐位或半卧位休息
      - 冰镇或室温食物可能比热食更易耐受，部分患者发现生姜茶或生姜糖有助于缓解恶心
      - 呕吐超过24小时、无法进食或进水，或出现脱水迹象（口干、极度乏力、尿量减少）——立即告知主管医生或就医
