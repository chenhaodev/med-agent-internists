specialty: neurology
specialty_zh: neurology
disease: myopathy
disease_zh: myopathy
source: 《西氏内科学精要》（中文版）
entries:
- id: MYOPATHY_DEF
  title: 肌病定义与分类
  source_page: 1188
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 肌病是骨骼肌纤维的原发疾病，分为遗传性和获得性两类。
  - 遗传性肌病由基因突变引起，获得性肌病由外界因素如药物、感染等导致。
  - 获得性肌病在消除诱因后通常可缓解。
  pdf_page: 576
- id: MYOPATHY_SYMPTOMS
  title: 肌病常见症状
  source_page: 1190
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 最常见症状是肌肉无力，导致上楼、从椅子站起或举物困难。
  - 其他症状包括乏力、肌肉疼痛、痉挛或挛缩。
  - 跟腱挛缩是长期慢性病程的表现。
  pdf_page: 578
- id: MYOPATHY_DIAGNOSIS_CK
  title: 肌酸激酶检测意义
  source_page: 1191
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 肌酸激酶升高提示骨骼肌损害，是肌病的重要筛查指标。
  - 肌营养不良和炎性肌病时肌酸激酶可升高10倍以上。
  - 肌酸激酶升高也可见于运动、外伤或药物，需结合其他检查。
  pdf_page: 579
- id: MYOPATHY_ELECTROPHYSIOLOGY
  title: 电生理检查作用
  source_page: 1191
  evidence_level: 中
  recommendation: 推荐
  key_points:
  - 电生理检查可区分肌源性还是神经源性无力。
  - 肌病患者神经传导正常，肌电图显示短时限、低波幅电位。
  - 急性肌病可见纤颤电位或正锐波。
  pdf_page: 579
- id: MYOPATHY_MUSCLE_BIOPSY
  title: 肌活检诊断价值
  source_page: 1192
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 肌活检可显示特征性病理改变，如炎细胞浸润或线粒体异常。
  - 对先天性肌病、炎性肌病和代谢性肌病有确诊价值。
  - 多数肌病表现为非特异性改变，需结合基因检测。
  pdf_page: 580
- id: MYOPATHY_GENETIC_TESTING
  title: 基因检测确诊遗传性肌病
  source_page: 1192
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 基因检测可确诊遗传性肌病，指导预后和治疗。
  - 家族史提示遗传性肌病时，基因检测尤为重要。
  - 检测结果有助于评估家族成员患病风险。
  pdf_page: 580
- id: DMD_DEFINITION
  title: 杜氏肌营养不良概述
  source_page: 1192
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 杜氏肌营养不良是X连锁隐性遗传病，男婴发病率约1/5300。
  - 由抗肌萎缩蛋白基因突变引起，导致进行性肌无力。
  - 约1/3病例为新发突变，无家族史。
  pdf_page: 580
- id: DMD_SYMPTOMS
  title: 杜氏肌营养不良临床表现
  source_page: 1192
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 起病年龄2-3岁，表现为运动发育迟滞、跑步困难。
  - 腓肠肌假性肥大和Gowers征是典型体征。
  - 10岁左右需轮椅代步，平均智商偏低。
  pdf_page: 580
- id: DMD_TREATMENT
  title: 杜氏肌营养不良治疗管理
  source_page: 1193
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 泼尼松或地夫可特可改善肌力和运动功能。
  - 需定期监测心脏功能，使用ACEI或β受体阻滞剂。
  - 肺功能监测应在用轮椅前或用力肺活量降至80%时开始。
  pdf_page: 581
- id: DMD_PROGNOSIS
  title: 杜氏肌营养不良预后
  source_page: 1194
  evidence_level: 中
  recommendation: 推荐
  key_points:
  - 无呼吸机支持时，患者多在20岁左右因呼吸衰竭去世。
  - 充血性心力衰竭和心律失常可能出现在病程后期。
  - 女性携带者可能出现症状或严重心肌病。
  pdf_page: 582
- id: MYOTONIC_DYSTROPHY
  title: 强直性肌营养不良特点
  source_page: 1194
  evidence_level: 高
  recommendation: 强推荐
  key_points:
  - 强直性肌营养不良是常染色体显性遗传病，以肌萎缩和肌强直为特点。
  - 1型由CTG重复扩增引起，2型由CCGT重复扩增引起。
  - 1型是最常见的成人肌营养不良，活婴患病率13.5/100000。
  pdf_page: 582
- id: MYOPATHY_WHEN_TO_SEE_DOCTOR
  title: 何时就医
  source_page: 1190
  evidence_level: 未注明
  recommendation: 强推荐
  key_points:
  - 出现进行性肌无力，如上楼、从椅子站起或举物困难时就医。
  - 肌肉疼痛、痉挛或跟腱挛缩持续不缓解时需就诊。
  - 有家族史且出现类似症状时，应尽早进行遗传咨询。
  pdf_page: 578
